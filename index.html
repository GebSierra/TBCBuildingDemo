document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ccdf;margin:0;max-width:440px\">Not equal gifts — equal sacrifice. Every commitment, at every level, moves us toward a debt-free building.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Body -->\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">{{ thankYou }}<\u002Fsc-if>\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n\n      <div style=\"padding:32px 36px 38px\">\n\n        <!-- STEP: About you -->\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#EA533C;margin-bottom:14px\">Who's pledging<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px\">\n          <div>\n            <label style=\"display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#141B35\">First name<\u002Flabel>\n            <input value=\"{{ first }}\" sc-camel-on-input=\"{{ setFirst }}\" placeholder=\"First\" style=\"{{ inputStyle }}\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#141B35\">Last name<\u002Flabel>\n            <input value=\"{{ last }}\" sc-camel-on-input=\"{{ setLast }}\" placeholder=\"Last\" style=\"{{ inputStyle }}\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-bottom:14px\">\n          <label style=\"display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#141B35\">Email<\u002Flabel>\n          <input value=\"{{ email }}\" sc-camel-on-input=\"{{ setEmail }}\" type=\"email\" placeholder=\"you@example.com\" style=\"{{ inputStyle }}\">\n        <\u002Fdiv>\n        <div style=\"margin-bottom:30px\">\n          <label style=\"display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#141B35\">Household / family name <span style=\"color:#9aa2b5;font-weight:400\">(optional)<\u002Fspan><\u002Flabel>\n          <input value=\"{{ household }}\" sc-camel-on-input=\"{{ setHousehold }}\" placeholder=\"The Smith Family\" style=\"{{ inputStyle }}\">\n        <\u002Fdiv>\n\n        <!-- STEP: Amount -->\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#EA533C;margin-bottom:6px\">My commitment<\u002Fdiv>\n        <p style=\"font-size:14px;color:#5b6478;margin:0 0 14px\">Pick a giving level, or enter your own. We'll show your three-year total.<\u002Fp>\n\n        <div style=\"margin-bottom:8px\">\n          <div style=\"display:flex;gap:10px;margin-bottom:14px\">\n            <button sc-camel-on-click=\"{{ setFreqMonth }}\" style=\"{{ freqMonthStyle }}\">Per month<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ setFreqYear }}\" style=\"{{ freqYearStyle }}\">Per year<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ setFreqOnce }}\" style=\"{{ freqOnceStyle }}\">One-time<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px\">\n          <sc-for list=\"{{ presets }}\" as=\"p\" hint-placeholder-count=\"8\">\n            <button sc-camel-on-click=\"{{ p.select }}\" style=\"{{ p.style }}\">{{ p.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:20px\">\n          <label style=\"display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#141B35\">Custom amount ({{ freqLabel }})<\u002Flabel>\n          <div style=\"position:relative\">\n            <span style=\"position:absolute;left:16px;top:50%;transform:translateY(-50%);font-weight:700;color:#5b6478;font-size:16px\">$<\u002Fspan>\n            <input value=\"{{ amountStr }}\" sc-camel-on-input=\"{{ setAmount }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"{{ amountInputStyle }}\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Total callout -->\n        <div style=\"background:#f5f6f8;border:1px solid #e3e6ec;border-radius:12px;padding:20px 22px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n          <div>\n            <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#5b6478\">My three-year total<\u002Fdiv>\n            <div style=\"font-size:13px;color:#8a92a4;margin-top:2px\">{{ breakdown }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Mulish','Montserrat',sans-serif;font-weight:800;font-size:34px;color:#EA533C;line-height:1\">{{ totalStr }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- STEP: Timing -->\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#EA533C;margin-bottom:14px\">When I plan to start<\u002Fdiv>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-bottom:30px\">\n          <sc-for list=\"{{ startOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n            <button sc-camel-on-click=\"{{ o.select }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- Prayer / note -->\n        <div style=\"margin-bottom:22px\">\n          <label style=\"display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#141B35\">A prayer or note to the elders <span style=\"color:#9aa2b5;font-weight:400\">(optional)<\u002Fspan><\u002Flabel>\n          <textarea value=\"{{ note }}\" sc-camel-on-input=\"{{ setNote }}\" rows=\"3\" placeholder=\"How can we pray for you as we build together?\" style=\"{{ textareaStyle }}\"><\u002Ftextarea>\n        <\u002Fdiv>\n\n        <!-- Commitment checkbox -->\n        <label style=\"display:flex;gap:12px;align-items:flex-start;background:#fbfbfd;border:1px solid #e3e6ec;border-radius:10px;padding:14px 16px;margin-bottom:24px;cursor:pointer\">\n          <input type=\"checkbox\" checked=\"{{ faithChecked }}\" sc-camel-on-change=\"{{ toggleFaith }}\" style=\"margin-top:3px;width:18px;height:18px;accent-color:#EA533C;flex:none\">\n          <span style=\"font-size:14px;color:#3f4658\">I'm making this pledge prayerfully and in faith, understanding it is a good-faith intention — not a legal contract — and that Trinity will begin building only when pledges show the work can be paid off within three to five years.<\u002Fspan>\n        <\u002Flabel>\n\n        <button sc-camel-on-click=\"{{ submit }}\" style=\"{{ submitStyle }}\">Submit My Pledge<\u002Fbutton>\n        <p style=\"text-align:center;font-size:13px;color:#8a92a4;margin:14px 0 0\">Prefer paper? Pick up a card at the welcome table any Sunday.<\u002Fp>\n\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <p style=\"text-align:center;font-size:13px;color:#8a92a4;margin:22px 0 0\">Trinity Bible Church · Edwardsburg, MI · Colossians 2:6–7<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    first:\"\", last:\"\", email:\"\", household:\"\",\n    freq:\"month\",           // month | year | once\n    amount:0,               // in dollars, at the chosen frequency\n    start:\"2027\",\n    note:\"\", faith:false,\n    submitted:false\n  };\n\n  fmt(n){ return \"$\" + Math.round(n).toLocaleString(\"en-US\"); }\n\n  threeYearTotal(){\n    const a = this.state.amount || 0;\n    if(this.state.freq === \"month\") return a * 36;\n    if(this.state.freq === \"year\")  return a * 3;\n    return a; // one-time\n  }\n\n  presetValues(){\n    // values expressed at the CURRENTLY selected frequency\n    if(this.state.freq === \"month\") return [100,250,500,1000,2500,5000,10000,25000];\n    if(this.state.freq === \"year\")  return [1200,3000,6000,12000,30000,60000,120000,300000];\n    return [1000,2500,5000,10000,25000,50000,100000,250000]; // one-time\n  }\n\n  renderVals(){\n    const st = this.state;\n    const baseInput = {\n      width:\"100%\", boxSizing:\"border-box\", padding:\"12px 14px\",\n      border:\"1.5px solid #d9dde5\", borderRadius:\"10px\", fontSize:\"15px\",\n      color:\"#141B35\", background:\"#fff\", outline:\"none\"\n    };\n    const pill = (active) => ({\n      flex:\"1\", padding:\"11px 8px\", borderRadius:\"10px\", cursor:\"pointer\",\n      fontSize:\"14px\", fontWeight:\"600\", textAlign:\"center\",\n      border: active ? \"1.5px solid #EA533C\" : \"1.5px solid #d9dde5\",\n      background: active ? \"#EA533C\" : \"#fff\",\n      color: active ? \"#fff\" : \"#141B35\"\n    });\n\n    const freqLabelMap = { month:\"per month\", year:\"per year\", once:\"one-time\" };\n\n    const presets = this.presetValues().map(v => {\n      const active = st.amount === v;\n      return {\n        label: this.fmt(v),\n        select: () => this.setState({ amount: v }),\n        style: {\n          padding:\"12px 4px\", borderRadius:\"10px\", cursor:\"pointer\",\n          fontSize:\"15px\", fontWeight:\"700\",\n          border: active ? \"2px solid #EA533C\" : \"1.5px solid #d9dde5\",\n          background: active ? \"#FEF1EE\" : \"#fff\",\n          color: active ? \"#D1432E\" : \"#141B35\"\n        }\n      };\n    });\n\n    const starts = [\n      { key:\"2027\", label:\"2027\" },\n      { key:\"2028\", label:\"2028\" },\n      { key:\"already\", label:\"I'm already giving\" }\n    ];\n    const startOptions = starts.map(o => {\n      const active = st.start === o.key;\n      return {\n        label:o.label,\n        select:()=>this.setState({ start:o.key }),\n        style:{\n          padding:\"10px 18px\", borderRadius:\"999px\", cursor:\"pointer\",\n          fontSize:\"14px\", fontWeight:\"600\",\n          border: active ? \"1.5px solid #204472\" : \"1.5px solid #d9dde5\",\n          background: active ? \"#204472\" : \"#fff\",\n          color: active ? \"#fff\" : \"#141B35\"\n        }\n      };\n    });\n\n    const total = this.threeYearTotal();\n    let breakdown = \"Enter an amount to see your total\";\n    if(st.amount>0){\n      if(st.freq===\"month\") breakdown = this.fmt(st.amount) + \"/mo × 36 months\";\n      else if(st.freq===\"year\") breakdown = this.fmt(st.amount) + \"/yr × 3 years\";\n      else breakdown = \"One-time gift\";\n    }\n\n    const canSubmit = st.first && st.last && st.email && st.amount>0 && st.faith;\n\n    // Thank-you panel\n    const thankYou = React.createElement(\"div\", {\n      style:{ padding:\"48px 40px 52px\", textAlign:\"center\" }\n    },\n      React.createElement(\"div\", { style:{\n        width:\"64px\", height:\"64px\", borderRadius:\"50%\", background:\"#FEF1EE\",\n        color:\"#EA533C\", display:\"flex\", alignItems:\"center\", justifyContent:\"center\",\n        fontSize:\"32px\", margin:\"0 auto 22px\", fontWeight:\"800\"\n      }}, \"\\u2713\"),\n      React.createElement(\"h2\", { style:{\n        fontFamily:\"'Mulish','Montserrat',sans-serif\", fontWeight:800, fontSize:\"28px\",\n        color:\"#141B35\", margin:\"0 0 12px\"\n      }}, \"Thank you, \" + (st.first || \"friend\") + \".\"),\n      React.createElement(\"p\", { style:{\n        fontSize:\"16px\", color:\"#5b6478\", maxWidth:\"420px\", margin:\"0 auto 8px\"\n      }}, \"Your three-year pledge of \" + this.fmt(total) + \" has been recorded. We'll follow up by email, and we'll be praying for you as we build together.\"),\n      React.createElement(\"p\", { style:{\n        fontSize:\"14px\", color:\"#8a92a4\", maxWidth:\"420px\", margin:\"18px auto 26px\", fontStyle:\"italic\"\n      }}, \"\\u201C\\u2026rooted and built up in him and established in the faith\\u2026 abounding in thanksgiving.\\u201D \\u2014 Colossians 2:7\"),\n      React.createElement(\"button\", {\n        onClick:()=>this.setState({ submitted:false }),\n        style:{\n          background:\"transparent\", border:\"1.5px solid #d9dde5\", color:\"#204472\",\n          fontWeight:600, fontSize:\"14px\", padding:\"11px 22px\", borderRadius:\"10px\", cursor:\"pointer\"\n        }\n      }, \"Submit another pledge\")\n    );\n\n    return {\n      submitted: st.submitted,\n      notSubmitted: !st.submitted,\n      thankYou,\n\n      first:st.first, last:st.last, email:st.email, household:st.household, note:st.note,\n      setFirst:e=>this.setState({first:e.target.value}),\n      setLast:e=>this.setState({last:e.target.value}),\n      setEmail:e=>this.setState({email:e.target.value}),\n      setHousehold:e=>this.setState({household:e.target.value}),\n      setNote:e=>this.setState({note:e.target.value}),\n\n      inputStyle: baseInput,\n      textareaStyle: { ...baseInput, resize:\"vertical\", lineHeight:\"1.5\" },\n\n      freqLabel: freqLabelMap[st.freq],\n      setFreqMonth:()=>this.setState({freq:\"month\", amount:0}),\n      setFreqYear:()=>this.setState({freq:\"year\", amount:0}),\n      setFreqOnce:()=>this.setState({freq:\"once\", amount:0}),\n      freqMonthStyle: pill(st.freq===\"month\"),\n      freqYearStyle: pill(st.freq===\"year\"),\n      freqOnceStyle: pill(st.freq===\"once\"),\n\n      presets,\n      amountStr: st.amount ? String(st.amount) : \"\",\n      setAmount:e=>{\n        const n = parseInt(String(e.target.value).replace(/[^0-9]/g,\"\"),10);\n        this.setState({ amount: isNaN(n)?0:n });\n      },\n      amountInputStyle: { ...baseInput, paddingLeft:\"30px\", fontWeight:700, fontSize:\"16px\" },\n\n      totalStr: total>0 ? this.fmt(total) : \"$0\",\n      breakdown,\n\n      startOptions,\n\n      faithChecked: st.faith,\n      toggleFaith:()=>this.setState({faith:!st.faith}),\n\n      submit:()=>{ if(canSubmit) this.setState({submitted:true}); },\n      submitStyle: {\n        width:\"100%\", padding:\"16px\", borderRadius:\"12px\", border:\"none\",\n        fontSize:\"16px\", fontWeight:700, cursor: canSubmit ? \"pointer\" : \"not-allowed\",\n        background: canSubmit ? \"#EA533C\" : \"#e3b7ac\",\n        color:\"#fff\", transition:\"background .15s\"\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
